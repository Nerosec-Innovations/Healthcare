<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Healthcare Form</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- Top Bar -->
<header>
        <div class="marquee-wrapper"><h6 class="marquee-text">The health and well being of our patients and their health care team will always be our priority so we follow the best practices for cleanliness</h6></div>
    </header>
<!-- Header -->
<div class="header-3">
  <div class="container">
    <div class="row">

      <div class="col-md-6 d-flex flex-column gap-3">
        <h5>Healthcare Solution service LLC</h5>
      </div>
      <div class="col-md-6 text-center a-3 d-flex flex-column align-items-center">
        <div class="d-flex gap-5">
            <a href="desktop.html" class="mx-2 text-decoration-none text-black">Home</a>
        <a href="desktop.html" class="mx-2 text-decoration-none text-black">Assignment</a>
        <a href="#" class="mx-2 text-decoration-none text-black">Settings</a>
        </div>
      </div> 
    </div>
    <div class="d-flex align-items-center justify-content-center ">
          <button class="pending-btn mt-2 w-25 mt-5">Jaya</button>
    </div>
  </div>
</div>
<div class="section-bg-3">
  <div class="overlay">
    <div class="container">

      <div class="row g-4 align-items-start">

      <!-- LEFT INFO -->
<div class="col-md-6">
  <div class="info-card d-flex">

    <div class="d-flex flex-column w-75">
      <p><strong>Patient Name:</strong></p>
      <p><strong>Age:</strong></p>
      <p><strong>Contact:</strong></p>
      <p><strong>Address:</strong></p>
      <p><strong>Completed:</strong></p>
    </div>

    <div class="d-flex flex-column justify-content-start w-75 align-items-start justify-content-center">
      <p id="name" class="fw-bold"></p>
      <p id="age" class="fw-bold"></p>
      <p id="contact" class="fw-bold"></p>
      <p id="address" class="fw-bold"></p>
      <p id="date" class="fw-bold"></p>
    </div>

  </div>
</div>

<!-- RIGHT SIDE -->
<div class="col-md-6">
  <h5 class="mb-3">Assessment Details</h5>

  <div id="assessmentContainer"></div>

  <div class="view-all">View all</div>
</div>

        <div class="d-flex gap-5 align-items-center justify-content-center">
<div class="text-center mt-4">
            <button class="btn-custom" onclick="viewInvoice()">View Invoice</button>
          </div>

             <div class="text-center mt-3 d-flex">
            <button class="icon-btn me-2 w-75" onclick="download()">
              <i class="bi bi-download"></i>
            </button>
            <button class="icon-btn w-75" onclick="share()">
              <i class="bi bi-share"></i>
            </button>
          </div>
          </div>
      </div>

    </div>
  </div>
</div>

<script>
  function viewDetails(type) {
    alert("Viewing " + type);
  }

  function viewInvoice() {
    alert("Opening Invoice...");
  }

  function download() {
    alert("Downloading...");
  }

  function share() {
    alert("Sharing...");
  }
</script>

<!-- JavaScript -->
<script>
function viewDetails(name) {
    alert("Viewing details for " + name);
  }
</script>
<script>
  // Load random patient data
  async function loadPatient() {
    try {
      const res = await fetch("https://randomuser.me/api/");
      const data = await res.json();

      const user = data.results[0];

      document.getElementById("name").innerText =
        user.name.first + " " + user.name.last;

      document.getElementById("age").innerText =
        user.dob.age;

      document.getElementById("contact").innerText =
        user.phone;

      document.getElementById("address").innerText =
        user.location.street.name + ", " + user.location.city;

      document.getElementById("date").innerText =
        new Date().toDateString();

    } catch (error) {
      console.error("Error loading patient:", error);
    }
  }

  // Random assessments
  function loadAssessments() {
    const types = [
      "Blood Pressure",
      "Heart Rate",
      "Oxygen Level",
      "Temperature",
      "Sugar Level"
    ];

    const container = document.getElementById("assessmentContainer");
    container.innerHTML = "";

    for (let i = 0; i < 3; i++) {
      const randomType = types[Math.floor(Math.random() * types.length)];

      const div = document.createElement("div");
      div.className = "assessment-card";

      div.innerHTML = `
        <span class="fw-bold">${randomType}</span>
        <button class="btn-custom" onclick="viewDetails('${randomType}')">
          View Details
        </button>
      `;

      container.appendChild(div);
    }
  }

  function viewDetails(type) {
    alert("Viewing " + type);
  }

  // Load everything
  window.onload = function () {
    loadPatient();
    loadAssessments();
  };
</script>

</body>
</html>
