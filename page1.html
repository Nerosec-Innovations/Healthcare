<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Healthcare Form</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="style.css">
  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
</head>

<body>

<!-- Top Bar -->
<header>
        <div class="marquee-wrapper"><h6 class="marquee-text">The health and well being of our patients and their health care team will always be our priority so we follow the best practices for cleanliness</h6></div>
    </header>
<!-- Header -->
<div class="header">
  <div class="container">
    <div class="row align-items-center">

      <div class="col-md-6 mb-2">
        <h5>Healthcare Solution service LLC</h5>
        <button class="register-btn mt-2">Register</button>
      </div>

      <div class="col-md-6 text-center d-flex flex-column align-items-center gap-3">
        <div class="d-flex gap-5">
            <a href="#" class="mx-2 text-decoration-none text-black">Home</a>
        <a href="#" class="mx-2 text-decoration-none text-black">Assignment</a>
        <a href="#" class="mx-2 text-decoration-none text-black">Settings</a>
        </div>
        <div class="position-relative Search">
  <input type="text" class="form-control rounded-pill pe-5" placeholder="Search">
  <i class="bi bi-search position-absolute top-50 end-0 translate-middle-y me-3"></i>
</div>

      </div>

      

    </div>
  </div>
</div>

<!-- Form Section -->
<div class="form-section">
  <div class="container">

    <div class="row g-4">

      <div class="col-md-6">
        <h5>Blood Pressure</h5>
        <input type="text" class="form-box" id="bp" placeholder="Submit Your Answer Here">
      </div>

      <div class="col-md-6">
        <h5>Body Temperature</h5>
        <input type="text" class="form-box" id="temp" placeholder="Submit Your Answer Here">
      </div>

      <div class="col-md-6">
        <h5>Haemoglobin</h5>
        <input type="text" class="form-box" id="hb" placeholder="Submit Your Answer Here">
      </div>

      <div class="col-md-6">
        <h5>Other</h5>
        <input type="text" class="form-box" id="other" placeholder="Submit Your Answer Here">
      </div>

      <div class="col-md-6">
        <h5>Body Temperature</h5>
        <input type="text" class="form-box" id="temp2" placeholder="Submit Your Answer Here">
      </div>

    </div>

    <!-- Submit Button -->
    <div class="text-center mt-5">
      <button class="submit-btn" onclick="submitForm()">Submit</button>
    </div>

  </div>
</div>

<!-- JavaScript -->
<script>
  function submitForm() {
    const data = {
      bloodPressure: document.getElementById("bp").value,
      temperature1: document.getElementById("temp").value,
      haemoglobin: document.getElementById("hb").value,
      other: document.getElementById("other").value,
      temperature2: document.getElementById("temp2").value
    };

    console.log("Form Data:", data);

    alert("Form Submitted Successfully!");

    // Clear fields
    document.querySelectorAll("input").forEach(input => input.value = "");
  }
</script>

</body>
</html>
