<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Register</title>

  <!-- Bootstrap + Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
    }

    /* Background Theme (same style) */
    .register-section {
      background: linear-gradient(to bottom, #9fd3d3, #0f5f5f);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .register-box {
      text-align: center;
      color: black;
    }

    .register-box h2 {
      margin-bottom: 40px;
      font-weight: bold;
    }

    /* Cards */
    .option-card {
      background: #eee;
      border-radius: 10px;
      padding: 40px 20px;
      transition: 0.3s;
      cursor: pointer;
    }

    .option-card i {
      font-size: 50px;
      color: #0f8f8f;
      margin-bottom: 15px;
    }

    .option-card:hover {
      transform: translateY(-10px) scale(1.05);
      box-shadow: 0 15px 25px rgba(0,0,0,0.3);
      background: white;
    }

    /* Button */
    .back-btn {
      margin-top: 30px;
      background: black;
      color: white;
      border-radius: 10px;
      padding: 10px 30px;
      border: none;
      transition: 0.3s;
    }
.col-10 a{
    text-decoration: none;
    color: black;
}
    .back-btn:hover {
      background: #222;
      transform: scale(1.05);
    }
  </style>
</head>

<body>

<div class="register-section">
  <div class="container register-box">

    <h2>Register As</h2>

    <div class="row justify-content-center g-4">

      <!-- Doctor -->
      <div class="col-10 col-md-4">
        <div class="option-card" >
          <i class="bi bi-person-badge"></i>
          <a href="/doctor-regis.html"><h5>Doctor Register</h5></a>
        </div>
      </div>

      <!-- Patient -->
      <div  class="col-10 col-md-4">
        <a href="/patient-regis.html">        
            <div class="option-card">
          <i class="bi bi-person"></i>
          <a href="/patient-regis.html"><h5>Patient Register</h5></a>
        </div>
        </a>

      </div>

    </div>

    <!-- Optional Back -->
    <button class="back-btn" onclick="goBack()">Back</button>

  </div>
</div>

<script>
  function selectRole(role) {
    alert(role + " Registration Selected");

    // Redirect example (you can change later)
    if (role === "Doctor") {
      window.location.href = "doctor-register.html";
    } else {
      window.location.href = "patient-register.html";
    }
  }

  function goBack() {
    window.history.back();
  }
</script>

</body>
</html>
