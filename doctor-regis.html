<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Doctor Register</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
  font-family: Arial;
}

.section {
  background: linear-gradient(to bottom, #9fd3d3, #0f5f5f);
  padding: 50px 0;
}

.form-box {
  background: #eee;
  padding: 30px;
  border-radius: 10px;
  transition: 0.3s;
}

.form-box:hover {
  box-shadow: 0 10px 20px rgba(0,0,0,0.2);
}

.btn-custom {
  background: #17a2a2;
  color: white;
  border-radius: 10px;
  padding: 10px;
  border: none;
}

.btn-custom:hover {
  background: #138d8d;
}
</style>
</head>

<body>

<div class="section">
<div class="container">

<h3 class="text-center mb-4">Doctor Registration</h3>

<form id="doctorForm" class="form-box">

<div class="row g-3">

<div class="col-md-6">
<input type="text" class="form-control" placeholder="Full Name" required>
</div>

<div class="col-md-6">
<input type="email" class="form-control" placeholder="Email" required>
</div>

<div class="col-md-6">
<input type="text" class="form-control" placeholder="Phone Number" required>
</div>

<div class="col-md-6">
<input type="number" class="form-control" placeholder="Age" required>
</div>

<div class="col-md-6">
<select class="form-control" required>
<option value="">Specialization</option>
<option>Cardiology</option>
<option>Dentistry</option>
<option>Neurology</option>
<option>Orthopedic</option>
</select>
</div>

<div class="col-md-6">
<input type="number" class="form-control" placeholder="Experience (Years)" required>
</div>

<div class="col-md-12">
<input type="text" class="form-control" placeholder="Clinic/Hospital Name" required>
</div>

<div class="col-md-12">
<textarea class="form-control" placeholder="Address" required></textarea>
</div>

<div class="col-md-6">
<input type="text" class="form-control" placeholder="License Number" required>
</div>

<div class="col-md-6">
<input type="file" class="form-control">
</div>

</div>

<div class="text-center mt-4">
<button class="btn-custom">Register</button>
</div>

</form>

</div>
</div>

<script>
document.getElementById("doctorForm").addEventListener("submit", function(e){
  e.preventDefault();
  alert("Doctor Registered Successfully!");
});
</script>

</body>
</html>
